services:
  captcha:
    build: .
    image: pow-captcha:latest
    container_name: pow-captcha
    ports:
      - "8787:8787"
    volumes:
      - ./captcha.toml:/etc/captcha/captcha.toml:ro
    command: ["--config", "/etc/captcha/captcha.toml"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/captcha-server", "healthcheck", "127.0.0.1:8787"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
