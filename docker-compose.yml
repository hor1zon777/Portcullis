services:
  captcha-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--config", "/etc/captcha/captcha.toml"]
    volumes:
      - ./captcha.toml:/etc/captcha/captcha.toml:ro
      - ./data:/data
    environment:
      - CAPTCHA_DB_PATH=/data/captcha.db
    expose:
      - "8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/captcha-server", "healthcheck", "127.0.0.1:8787"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - captcha-server
      - admin-ui
    restart: unless-stopped
