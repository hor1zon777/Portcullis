# 本地构建版本（开发用）
# 使用：docker compose -f docker-compose.build.yml up --build

services:
  captcha-server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - CAPTCHA_DB_PATH=/data/captcha.db
    volumes:
      - ./data:/data
    expose:
      - "8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/captcha-server", "healthcheck", "127.0.0.1:8787"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - captcha-server
      - admin-ui
    restart: unless-stopped
