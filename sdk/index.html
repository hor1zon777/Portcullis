<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>PoW CAPTCHA Auto-Mount Dev</title>
    <style>
      body { font-family: system-ui, sans-serif; display: flex; justify-content: center; padding: 60px 20px; background: #f0f0f0; }
      .card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,.08); width: 380px; }
      h2 { margin: 0 0 24px; font-size: 20px; }
      label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
      input { width: 100%; padding: 10px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 14px; margin-bottom: 14px; box-sizing: border-box; }
      input:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
      button { width: 100%; padding: 10px; font-size: 14px; font-weight: 600; background: #0969da; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
      button:disabled { opacity: .5; cursor: not-allowed; }
      .captcha-row { margin: 14px 0; }
      #msg { margin-top: 12px; padding: 10px; border-radius: 6px; display: none; font-size: 13px; background: #dafbe1; border: 1px solid #a4e7b5; color: #116329; word-break: break-all; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>PoW CAPTCHA · 零 JS 接入演示</h2>
      <p style="font-size: 13px; color: #666; margin-top: 0;">
        无需写任何 JS 代码，只需引入脚本和 data 属性。
      </p>
      <form id="form">
        <label>用户名</label>
        <input name="username" required value="alice" />
        <label>密码</label>
        <input name="password" type="password" required value="test" />

        <div class="captcha-row">
          <div data-pow-captcha
               data-target="captcha_token"
               data-callback="onCaptcha"></div>
        </div>

        <input type="hidden" id="captcha_token" name="captcha_token" />
        <button type="submit" id="btn" disabled>登录</button>
      </form>
      <div id="msg"></div>
    </div>

    <!-- 仅一行脚本即可启用 PoW CAPTCHA -->
    <!-- 开发模式：直接引用源码 + 显式指定 endpoint/wasmBase；生产模式：替换为 https://captcha.example.com/sdk/pow-captcha.js 即可 -->
    <script type="module"
            src="/src/auto-mount.ts"
            data-site-key="pk_test"
            data-endpoint="/api-proxy"
            data-wasm-base="/pkg"></script>

    <script>
      // 可选：定义 data-callback 指向的全局回调
      window.onCaptcha = function (token) {
        document.getElementById('btn').disabled = false;
        console.log('[demo] token:', token);
      };

      document.getElementById('form').addEventListener('submit', (e) => {
        e.preventDefault();
        const token = document.getElementById('captcha_token').value;
        const msg = document.getElementById('msg');
        msg.style.display = 'block';
        msg.innerHTML = '<strong>提交成功！</strong><br>captcha_token: ' + token.slice(0, 80) + '...';
      });
    </script>
  </body>
</html>
