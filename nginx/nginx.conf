worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/wasm;

    upstream captcha_server {
        server captcha-server:8787;
    }
    upstream admin_ui {
        server admin-ui:80;
    }

    server {
        listen 80;

        # 根路径 → 重定向到管理面板
        location = / {
            return 302 /admin/;
        }

        # 管理 API → captcha-server（必须在 /admin 之前匹配）
        location /admin/api/ {
            proxy_pass http://captcha_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # 管理面板 → admin-ui
        location /admin/ {
            proxy_pass http://admin_ui;
            proxy_set_header Host $host;
        }
        location /admin {
            return 301 /admin/;
        }

        # Prometheus（仅允许内网）
        location /metrics {
            proxy_pass http://captcha_server;
            # 生产环境取消注释以下行限制内网访问
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;
        }

        # 公共 API + SDK + healthz → captcha-server
        location / {
            proxy_pass http://captcha_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
