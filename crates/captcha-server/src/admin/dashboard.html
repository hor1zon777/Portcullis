<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PoW CAPTCHA Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f6f8fa;--card:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--primary:#0969da;--danger:#cf222e;--success:#1a7f37;--font:system-ui,-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
.header{background:#24292f;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;font-weight:600}
.header .badge{background:var(--success);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px}
.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid var(--border);padding:0 24px}
.tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;font-size:14px;color:var(--muted);transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.content{padding:24px;max-width:1200px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px}
.card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card .value{font-size:28px;font-weight:700}
.card .sub{font-size:12px;color:var(--muted);margin-top:4px}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
th{background:#f6f8fa;text-align:left;padding:10px 14px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid #eee;font-size:13px}
tr:last-child td{border-bottom:none}
.badge-ok{color:var(--success);font-weight:600}
.badge-fail{color:var(--danger);font-weight:600}
.btn{display:inline-block;padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;transition:.15s}
.btn:hover{background:#f3f4f6}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:#0860ca}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#a40e26}
.btn-sm{padding:4px 10px;font-size:12px}
.form-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.form-row input,.form-row select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.form-row input{flex:1;min-width:120px}
.empty{text-align:center;padding:40px;color:var(--muted)}
.mono{font-family:'Cascadia Code','Fira Code',Consolas,monospace;font-size:12px}
.refresh-info{font-size:12px;color:var(--muted);margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <h1>PoW CAPTCHA</h1>
  <span class="badge">Admin</span>
</div>
<div class="tabs" id="tabs">
  <div class="tab active" data-tab="monitor">监控</div>
  <div class="tab" data-tab="sites">站点管理</div>
  <div class="tab" data-tab="logs">请求日志</div>
  <div class="tab" data-tab="risk">IP 风控</div>
</div>
<div class="content">
  <!-- 监控 -->
  <div class="panel active" id="panel-monitor">
    <div class="refresh-info">每 5 秒自动刷新</div>
    <div class="cards" id="kpi-cards">
      <div class="card"><div class="label">站点数</div><div class="value" id="kpi-sites">-</div></div>
      <div class="card"><div class="label">Store 条目</div><div class="value" id="kpi-store">-</div><div class="sub" id="kpi-store-sub"></div></div>
      <div class="card"><div class="label">追踪 IP 数</div><div class="value" id="kpi-ips">-</div></div>
      <div class="card"><div class="label">日志条目</div><div class="value" id="kpi-logs">-</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="label">最近请求（实时）</div>
      <table><thead><tr><th>时间</th><th>IP</th><th>站点</th><th>状态</th><th>耗时</th></tr></thead>
      <tbody id="monitor-log-body"></tbody></table>
    </div>
  </div>

  <!-- 站点管理 -->
  <div class="panel" id="panel-sites">
    <div class="form-row">
      <input id="new-key" placeholder="site key (pk_xxx)">
      <input id="new-secret" placeholder="secret_key (>= 16 chars)">
      <input id="new-diff" type="number" value="18" min="8" max="28" style="width:70px" placeholder="diff">
      <input id="new-origins" placeholder="origins (逗号分隔)">
      <button class="btn btn-primary" onclick="createSite()">新增站点</button>
    </div>
    <table><thead><tr><th>Key</th><th>Diff</th><th>Origins</th><th>操作</th></tr></thead>
    <tbody id="sites-body"></tbody></table>
  </div>

  <!-- 请求日志 -->
  <div class="panel" id="panel-logs">
    <div class="refresh-info">每 5 秒自动刷新，最近 200 条</div>
    <table><thead><tr><th>时间</th><th>IP</th><th>站点</th><th>Nonce</th><th>状态</th><th>耗时</th></tr></thead>
    <tbody id="logs-body"></tbody></table>
  </div>

  <!-- IP 风控 -->
  <div class="panel" id="panel-risk">
    <div class="form-row">
      <input id="block-ip" placeholder="IP 或 CIDR（如 1.2.3.4 或 10.0.0.0/8）">
      <button class="btn btn-danger" onclick="blockIp()">封禁</button>
    </div>
    <h3 style="margin:16px 0 8px;font-size:14px">被追踪的 IP</h3>
    <table><thead><tr><th>IP</th><th>总次数</th><th>失败</th><th>失败率</th><th>Extra Diff</th><th>状态</th><th>操作</th></tr></thead>
    <tbody id="risk-ips-body"></tbody></table>
    <h3 style="margin:16px 0 8px;font-size:14px">黑名单</h3>
    <div id="blocked-list"></div>
    <h3 style="margin:16px 0 8px;font-size:14px">白名单</h3>
    <div id="allowed-list"></div>
  </div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const BASE = location.origin;
const H = {'content-type':'application/json','authorization':'Bearer '+TOKEN};

function api(path,opts){return fetch(BASE+'/admin/api'+path+'?token='+TOKEN,{headers:H,...opts}).then(r=>r.json())}

// Tabs
document.getElementById('tabs').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('panel-'+e.target.dataset.tab).classList.add('active');
});

function ts(ms){return new Date(ms).toLocaleTimeString()}

// ──── 监控 ────
async function refreshMonitor(){
  try{
    const [stats,logs]=await Promise.all([api('/stats'),api('/logs')]);
    document.getElementById('kpi-sites').textContent=stats.sites_count;
    document.getElementById('kpi-store').textContent=stats.store.challenges_used+stats.store.tokens_used;
    document.getElementById('kpi-store-sub').textContent='挑战:'+stats.store.challenges_used+' Token:'+stats.store.tokens_used+' 上限:'+stats.store.max_entries;
    document.getElementById('kpi-ips').textContent=stats.risk_ips_tracked;
    document.getElementById('kpi-logs').textContent=stats.request_log_count;
    const rows=logs.slice(0,10).map(l=>'<tr><td>'+ts(l.timestamp)+'</td><td class="mono">'+(l.ip||'-')+'</td><td>'+l.site_key+'</td><td class="'+(l.success?'badge-ok':'badge-fail')+'">'+(l.success?'成功':'失败')+'</td><td>'+l.duration_ms.toFixed(1)+'ms</td></tr>').join('');
    document.getElementById('monitor-log-body').innerHTML=rows||'<tr><td colspan="5" class="empty">暂无数据</td></tr>';
  }catch(e){console.error(e)}
}

// ──── 站点 ────
async function refreshSites(){
  try{
    const sites=await api('/sites');
    const rows=sites.map(s=>'<tr><td class="mono">'+s.key+'</td><td>'+s.diff+'</td><td>'+s.origins.join(', ')+'</td><td><button class="btn btn-danger btn-sm" onclick="deleteSite(\''+s.key+'\')">删除</button></td></tr>').join('');
    document.getElementById('sites-body').innerHTML=rows||'<tr><td colspan="4" class="empty">暂无站点</td></tr>';
  }catch(e){console.error(e)}
}
async function createSite(){
  const key=document.getElementById('new-key').value.trim();
  const secret_key=document.getElementById('new-secret').value.trim();
  const diff=parseInt(document.getElementById('new-diff').value)||18;
  const origins=document.getElementById('new-origins').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!key||secret_key.length<16)return alert('key 不能为空，secret_key >= 16 字节');
  await api('/sites',{method:'POST',body:JSON.stringify({key,secret_key,diff,origins})});
  document.getElementById('new-key').value='';
  document.getElementById('new-secret').value='';
  document.getElementById('new-origins').value='';
  refreshSites();
}
async function deleteSite(key){
  if(!confirm('确认删除站点 '+key+'？'))return;
  await api('/sites/'+key,{method:'DELETE'});
  refreshSites();
}

// ──── 日志 ────
async function refreshLogs(){
  try{
    const logs=await api('/logs');
    const rows=logs.map(l=>'<tr><td>'+ts(l.timestamp)+'</td><td class="mono">'+(l.ip||'-')+'</td><td>'+l.site_key+'</td><td class="mono">'+l.nonce+'</td><td class="'+(l.success?'badge-ok':'badge-fail')+'">'+(l.success?'成功':'失败')+'</td><td>'+l.duration_ms.toFixed(1)+'ms</td></tr>').join('');
    document.getElementById('logs-body').innerHTML=rows||'<tr><td colspan="6" class="empty">暂无日志</td></tr>';
  }catch(e){console.error(e)}
}

// ──── 风控 ────
async function refreshRisk(){
  try{
    const data=await api('/risk/ips');
    const rows=data.ips.map(ip=>'<tr><td class="mono">'+ip.ip+'</td><td>'+ip.total+'</td><td>'+ip.fails+'</td><td>'+(ip.fail_rate*100).toFixed(1)+'%</td><td>'+(ip.extra_diff>0?'+'+ip.extra_diff:'-')+'</td><td>'+(ip.is_blocked?'<span class="badge-fail">封禁</span>':ip.is_allowed?'<span class="badge-ok">白名单</span>':'正常')+'</td><td>'+(ip.is_blocked?'<button class="btn btn-sm" onclick="unblockIp(\''+ip.ip+'\')">解封</button>':'<button class="btn btn-danger btn-sm" onclick="blockIpDirect(\''+ip.ip+'\')">封禁</button>')+'</td></tr>').join('');
    document.getElementById('risk-ips-body').innerHTML=rows||'<tr><td colspan="7" class="empty">暂无追踪 IP</td></tr>';
    document.getElementById('blocked-list').innerHTML=data.blocked.length?data.blocked.map(b=>'<span class="mono" style="display:inline-block;margin:2px 6px 2px 0;padding:4px 10px;background:#ffebe9;border-radius:4px">'+b+' <a href="#" onclick="unblockIp(\''+b+'\');return false" style="color:var(--danger)">×</a></span>').join(''):'<span class="empty" style="display:inline-block">无</span>';
    document.getElementById('allowed-list').innerHTML=data.allowed.length?data.allowed.map(a=>'<span class="mono" style="display:inline-block;margin:2px 6px 2px 0;padding:4px 10px;background:#dafbe1;border-radius:4px">'+a+'</span>').join(''):'<span class="empty" style="display:inline-block">无</span>';
  }catch(e){console.error(e)}
}
async function blockIp(){
  const ip=document.getElementById('block-ip').value.trim();
  if(!ip)return;
  await api('/risk/block',{method:'POST',body:JSON.stringify({ip})});
  document.getElementById('block-ip').value='';
  refreshRisk();
}
function blockIpDirect(ip){api('/risk/block',{method:'POST',body:JSON.stringify({ip})}).then(()=>refreshRisk())}
function unblockIp(ip){api('/risk/block',{method:'DELETE',body:JSON.stringify({ip})}).then(()=>refreshRisk())}

// ──── 初始化 + 定时刷新 ────
function refreshAll(){refreshMonitor();refreshSites();refreshLogs();refreshRisk()}
refreshAll();
setInterval(refreshAll,5000);
</script>
</body>
</html>
