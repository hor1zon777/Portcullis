openapi: 3.1.0
info:
  title: PoW CAPTCHA API
  version: 1.5.0
  description: |
    基于 Argon2id + SHA-256 双阶段工作量证明的验证码服务。
    - /api/v1/challenge：发放挑战（v1.3+ 含 Argon2 参数 m/t/p_cost）
    - /api/v1/verify：校验解答，返回 captcha_token（v1.4+ 可按站点绑定 IP/UA）
    - /api/v1/siteverify：业务后端核验 token（v1.4+ 可选 client_ip/user_agent）
    - /admin/api/*：管理员 API（Bearer Token），含 v1.5+ 审计端点

servers:
  - url: http://localhost:8787
    description: 本地开发
  - url: https://captcha.example.com
    description: 生产环境（示例）

security: []

paths:
  /api/v1/challenge:
    post:
      summary: 发放 PoW 挑战
      operationId: createChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [site_key]
              properties:
                site_key:
                  type: string
                  maxLength: 64
                  example: pk_test
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChallengeResponse'
        '400':
          description: 未知 site_key / site_key 过长 / IP 绑定启用但无法识别真实 IP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Origin 不在站点白名单

  /api/v1/verify:
    post:
      summary: 提交 PoW 解答换取 captcha_token
      operationId: verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge, sig, nonce]
              properties:
                challenge:
                  $ref: '#/components/schemas/Challenge'
                sig:
                  type: string
                  description: base64 编码的 HMAC-SHA256 签名
                nonce:
                  type: integer
                  format: uint64
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResponse'
        '400':
          description: 挑战过期 / PoW 不满足 / 格式错误 / IP 绑定启用但无法识别真实 IP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 签名验证失败 / Origin 不在白名单
        '409':
          description: 挑战已被使用（重放）

  /api/v1/verify/batch:
    post:
      summary: 批量 verify（最多 20 条）
      operationId: verifyBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required: [challenge, sig, nonce]
                    properties:
                      challenge:
                        $ref: '#/components/schemas/Challenge'
                      sig:
                        type: string
                      nonce:
                        type: integer
                        format: uint64
      responses:
        '200':
          description: 批量结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                        captcha_token:
                          type: string
                        error:
                          type: string

  /api/v1/siteverify:
    post:
      summary: 业务后端核验 captcha_token
      operationId: siteVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, secret_key]
              properties:
                token:
                  type: string
                  description: 从 /verify 获取的 captcha_token
                secret_key:
                  type: string
                  description: 站点明文 secret_key（v1.5+ 服务端做 HMAC 比对）
                client_ip:
                  type: string
                  description: |
                    v1.4+ 身份绑定字段。启用 `bind_token_to_ip` 的 site 必填，
                    传入合法 IPv4/IPv6 字符串。未启用时被忽略。
                  example: "203.0.113.5"
                user_agent:
                  type: string
                  description: |
                    v1.4+ 身份绑定字段。启用 `bind_token_to_ua` 的 site 必填；
                    必须与浏览器发出 /verify 时的 User-Agent 原串一致。未启用时被忽略。
      responses:
        '200':
          description: 始终 200，用 success 字段表示结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteVerifyResponse'

  /admin/api/stats:
    get:
      summary: 服务指标（需 admin token）
      operationId: adminStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 当前指标
          content:
            application/json:
              schema:
                type: object

  /admin/api/sites:
    get:
      summary: 列出所有站点
      operationId: adminListSites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 站点列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SiteView'
    post:
      summary: 创建新站点（secret_key 仅在本次响应里返回明文）
      operationId: adminCreateSite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [diff]
              properties:
                diff:
                  type: integer
                  minimum: 0
                  maximum: 32
                origins:
                  type: array
                  items:
                    type: string
                argon2_m_cost:
                  type: integer
                  minimum: 8
                  maximum: 65536
                argon2_t_cost:
                  type: integer
                  minimum: 1
                  maximum: 10
                argon2_p_cost:
                  type: integer
                  enum: [1]
                bind_token_to_ip:
                  type: boolean
                bind_token_to_ua:
                  type: boolean
      responses:
        '201':
          description: 创建成功（含一次性明文 secret_key）
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  key:
                    type: string
                  secret_key:
                    type: string
                    description: |
                      v1.5+ 一次性返回的明文 secret_key。
                      服务端只保留 HMAC，list 接口不再返回原文。
                      管理员**必须**立即保存。
        '400':
          description: Argon2 参数越界
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/api/sites/{key}:
    put:
      summary: 更新站点
      operationId: adminUpdateSite
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                diff:
                  type: integer
                origins:
                  type: array
                  items:
                    type: string
                argon2_m_cost:
                  type: integer
                argon2_t_cost:
                  type: integer
                argon2_p_cost:
                  type: integer
                bind_token_to_ip:
                  type: boolean
                bind_token_to_ua:
                  type: boolean
      responses:
        '200':
          description: 更新成功
        '400':
          description: Argon2 参数越界
        '404':
          description: 站点不存在
    delete:
      summary: 删除站点
      operationId: adminDeleteSite
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
        '404':
          description: 站点不存在

  /admin/api/logs:
    get:
      summary: 请求日志（最近 200 条）
      operationId: adminLogs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 日志列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /admin/api/risk/ips:
    get:
      summary: IP 风控状态
      operationId: adminRiskIps
      security:
        - bearerAuth: []
      responses:
        '200':
          description: IP 状态
          content:
            application/json:
              schema:
                type: object

  /admin/api/risk/block:
    post:
      summary: 封禁 IP
      operationId: adminBlockIp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip:
                  type: string
      responses:
        '200':
          description: 封禁成功
        '400':
          description: 无效 IP 或已在黑名单
    delete:
      summary: 解封 IP
      operationId: adminUnblockIp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip:
                  type: string
      responses:
        '200':
          description: 解封成功

  /admin/api/manifest-pubkey:
    get:
      summary: 查询 Ed25519 manifest 公钥
      operationId: adminManifestPubkey
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 公钥状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  pubkey:
                    type: string
                  algorithm:
                    type: string
                    enum: [ed25519]
    delete:
      summary: 撤销 manifest 签名密钥
      operationId: adminRevokeManifestKey
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 撤销成功（幂等）

  /admin/api/manifest-pubkey/generate:
    post:
      summary: 一键生成 manifest 签名密钥对
      operationId: adminGenerateManifestKey
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 生成成功（覆盖已有密钥）

  /admin/api/audit:
    get:
      summary: 管理员操作审计列表（v1.5+）
      operationId: adminAudit
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: action
          in: query
          description: 过滤指定 action，例如 `site.create` / `login.fail`
          schema:
            type: string
      responses:
        '200':
          description: 审计列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'

  /healthz:
    get:
      summary: 健康检查
      operationId: healthz
      responses:
        '200':
          description: ok
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /metrics:
    get:
      summary: Prometheus 指标
      operationId: metrics
      responses:
        '200':
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  /sdk/manifest.json:
    get:
      summary: SDK 版本 + SRI integrity 清单（v1.2+）
      operationId: sdkManifest
      responses:
        '200':
          description: manifest JSON；opt-in 响应头含 `X-Portcullis-Signature`（Ed25519）
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  builtAt:
                    type: integer
                  artifacts:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        url:
                          type: string
                        integrity:
                          type: string
                          example: "sha384-..."
                        size:
                          type: integer

  /sdk/v{version}/{file}:
    get:
      summary: 版本化只读路径（immutable 长缓存，v1.2+）
      operationId: sdkVersioned
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
        - name: file
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 文件内容（Cache-Control immutable）
        '404':
          description: 版本不存在

  /sdk/{file}:
    get:
      summary: 嵌入式 SDK / WASM 静态资源（向后兼容路径）
      operationId: serveSdk
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
          examples:
            js:
              value: pow-captcha.js
            wasm:
              value: captcha_wasm_bg.wasm
      responses:
        '200':
          description: 文件内容
        '304':
          description: ETag 匹配，未修改
        '404':
          description: 文件不存在

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: admin_token

  schemas:
    Challenge:
      type: object
      required: [id, salt, diff, exp, site_key]
      properties:
        id:
          type: string
          format: uuid
        salt:
          type: string
          description: 16 字节盐（base64 标准编码）
        diff:
          type: integer
          minimum: 0
          maximum: 32
        exp:
          type: integer
          format: uint64
          description: 过期时间（unix 毫秒）
        site_key:
          type: string
        m_cost:
          type: integer
          description: |
            v1.3+ Argon2 memory cost (KiB)，范围 [8, 65536]。
            旧客户端发来的 JSON 无此字段时 serde 默认回填 4096。
          minimum: 8
          maximum: 65536
          default: 19456
        t_cost:
          type: integer
          description: v1.3+ Argon2 time cost，范围 [1, 10]
          minimum: 1
          maximum: 10
          default: 2
        p_cost:
          type: integer
          description: v1.3+ Argon2 parallelism，固定为 1
          enum: [1]

    ChallengeResponse:
      type: object
      properties:
        success:
          type: boolean
        challenge:
          $ref: '#/components/schemas/Challenge'
        sig:
          type: string
          description: HMAC-SHA256 签名（base64）

    VerifyResponse:
      type: object
      properties:
        success:
          type: boolean
        captcha_token:
          type: string
          description: |
            格式：base64url(payload_json).base64url(HMAC-SHA256)
            payload = { challenge_id, site_key, exp, ip_hash?, ua_hash? }
            v1.4+ 启用身份绑定的 site 发出的 token 含 ip_hash / ua_hash（base64url）
        exp:
          type: integer
          format: uint64

    SiteVerifyResponse:
      type: object
      properties:
        success:
          type: boolean
        challenge_id:
          type: string
        site_key:
          type: string
        error:
          type: string

    SiteView:
      type: object
      properties:
        key:
          type: string
        secret_key:
          type: string
          description: |
            v1.5+ 固定为 `"(hashed)"` 占位字符串；明文仅在创建时一次性返回。
            老版本（secret_key_hashed=false）会返回原文本值，升级迁移后自动切换。
        diff:
          type: integer
        origins:
          type: array
          items:
            type: string
        argon2_m_cost:
          type: integer
        argon2_t_cost:
          type: integer
        argon2_p_cost:
          type: integer
        bind_token_to_ip:
          type: boolean
          description: v1.4+
        bind_token_to_ua:
          type: boolean
          description: v1.4+
        secret_key_hashed:
          type: boolean
          description: v1.5+，内部存储是否已 HMAC 化（迁移完成后恒为 true）

    AuditEntry:
      type: object
      description: v1.5+ 管理员操作审计条目
      properties:
        id:
          type: integer
          format: int64
        ts:
          type: integer
          format: uint64
          description: unix 毫秒
        token_prefix:
          type: string
          nullable: true
          description: sha256(admin_token)[..4] 的 hex（8 字符），用于聚合追踪同一 token
        action:
          type: string
          enum:
            - site.create
            - site.update
            - site.delete
            - ip.block
            - ip.unblock
            - manifest.generate
            - manifest.revoke
            - login.fail
        target:
          type: string
          nullable: true
          description: 操作对象（site_key / ip / ...）
        ip:
          type: string
          nullable: true
          description: 请求来源 IP
        success:
          type: boolean
        meta_json:
          type: string
          nullable: true
          description: 附加 JSON 元数据（字符串形式）

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
