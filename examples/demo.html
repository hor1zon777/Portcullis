<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoW CAPTCHA Demo</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        display: flex; justify-content: center; align-items: center;
        min-height: 100vh; margin: 0; background: #f0f0f0;
      }
      .card {
        background: #fff; border-radius: 12px; padding: 32px 36px;
        box-shadow: 0 4px 20px rgba(0,0,0,.08); width: 380px; max-width: 95vw;
      }
      h2 { margin: 0 0 8px; font-size: 20px; font-weight: 600; }
      .subtitle { font-size: 13px; color: #666; margin: 0 0 24px; }
      label { display: block; font-size: 13px; margin-bottom: 6px; color: #555; }
      input:not([type='hidden']) {
        width: 100%; padding: 10px 12px; border: 1px solid #d0d7de;
        border-radius: 6px; font-size: 14px; margin-bottom: 16px;
      }
      input:focus { outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
      .captcha-row { display: flex; justify-content: center; margin: 16px 0; }
      button[type='submit'] {
        width: 100%; padding: 10px; font-size: 14px; font-weight: 600;
        background: #0969da; color: #fff; border: none; border-radius: 6px; cursor: pointer;
      }
      button:disabled { opacity: .5; cursor: not-allowed; }
      button:not(:disabled):hover { background: #0860ca; }
      #result {
        margin-top: 16px; padding: 12px; border-radius: 6px;
        font-size: 13px; display: none; word-break: break-all;
      }
      #result.ok { display: block; background: #dafbe1; border: 1px solid #a4e7b5; color: #116329; }
      .code {
        margin-top: 24px; padding: 14px; background: #f6f8fa;
        border-radius: 8px; font-size: 12px; line-height: 1.6;
        font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
        color: #24292f; overflow-x: auto;
      }
      .code .tag { color: #0550ae; }
      .code .attr { color: #953800; }
      .code .val { color: #0a3069; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>PoW CAPTCHA</h2>
      <p class="subtitle">
        零 JS 代码接入演示 — 只需一个 &lt;script&gt; 和 data 属性
      </p>

      <form id="form">
        <label for="username">用户名</label>
        <input id="username" name="username" required placeholder="alice" />

        <label for="password">密码</label>
        <input id="password" name="password" type="password" required placeholder="••••••" />

        <!-- PoW CAPTCHA：自动渲染 widget，通过后自动填充 #captcha_token -->
        <div class="captcha-row">
          <div data-pow-captcha
               data-target="captcha_token"
               data-callback="onCaptcha"></div>
        </div>

        <input type="hidden" id="captcha_token" name="captcha_token" />
        <button type="submit" id="submit-btn" disabled>登录</button>
      </form>

      <div id="result"></div>

      <!-- 接入代码预览 -->
      <div class="code">
        <span class="tag">&lt;script</span>
        <span class="attr"> src</span>=<span class="val">"http://localhost:8787/sdk/pow-captcha.js"</span><br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <span class="attr">data-site-key</span>=<span class="val">"pk_test"</span><span class="tag">&gt;&lt;/script&gt;</span><br><br>
        <span class="tag">&lt;div</span>
        <span class="attr"> data-pow-captcha</span>
        <span class="attr"> data-target</span>=<span class="val">"captcha_token"</span><span class="tag">&gt;&lt;/div&gt;</span><br>
        <span class="tag">&lt;input</span>
        <span class="attr"> type</span>=<span class="val">"hidden"</span>
        <span class="attr"> id</span>=<span class="val">"captcha_token"</span><span class="tag"> /&gt;</span>
      </div>
    </div>

    <!--
      ====== 接入方式 ======
      服务端已内嵌 SDK + WASM，直接从 captcha server 加载即可。
      修改下方 src 和 data-site-key 为你的实际值。
    -->
    <script src="http://localhost:8787/sdk/pow-captcha.js"
            data-site-key="pk_test"></script>

    <script>
      // 可选回调：验证通过后启用提交按钮
      function onCaptcha(token) {
        document.getElementById('submit-btn').disabled = false;
        console.log('[demo] captcha_token:', token.slice(0, 60) + '...');
      }

      // 表单提交（仅演示，实际应发送到业务后端）
      document.getElementById('form').addEventListener('submit', function(e) {
        e.preventDefault();
        var token = document.getElementById('captcha_token').value;
        if (!token) return alert('请先完成验证');
        var r = document.getElementById('result');
        r.className = 'ok';
        r.innerHTML = '<strong>提交成功！</strong><br>captcha_token: ' + token.slice(0, 80) + '...';
      });
    </script>
  </body>
</html>
