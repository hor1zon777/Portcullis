server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — 所有非文件请求返回 index.html
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # 静态资源长缓存
    location /admin/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
